---
- name: Deploy BudgetFlow App
  hosts: webserver
  become: yes 

  vars:
    app_dir: /home/ubuntu/budgetflow-app
    repo_url: https://github.com/olufrancis/budget_app.git

  tasks:

    # ─── SYSTEM UPDATE ───────────────────────────────────
    - name: Update and upgrade apt packages
      apt:
        update_cache: yes
        upgrade: yes

    # ─── INSTALL DEPENDENCIES ────────────────────────────
    - name: Install system dependencies
      apt:
        name:
          - python3
          - python3-pip
          - nginx
          - git
          - curl
        state: present

    - name: Install Gunicorn
      pip:
        name: gunicorn
        executable: pip3

    # ─── CLONE APP FROM GITHUB ───────────────────────────
    - name: Clone BudgetFlow repository
      git:
        repo: "{{ repo_url }}"
        dest: "{{ app_dir }}"
        update: yes
        force: yes

    # ─── INSTALL PYTHON DEPENDENCIES ─────────────────────
    - name: Install Python requirements
      pip:
        requirements: "{{ app_dir }}/app/requirements.txt"
        executable: pip3

    # ─── CONFIGURE GUNICORN SERVICE ──────────────────────
    - name: Create Gunicorn systemd service
      copy:
        dest: /etc/systemd/system/budgetflow.service
        content: |
          [Unit]
          Description=BudgetFlow Flask App
          After=network.target

          [Service]
          User=ubuntu
          WorkingDirectory={{ app_dir }}/app
          ExecStart=/usr/local/bin/gunicorn --workers 3 --bind 127.0.0.1:5000 app:app
          Restart=always

          [Install]
          WantedBy=multi-user.target

    - name: Enable and start BudgetFlow service
      systemd:
        name: budgetflow
        enabled: yes
        state: restarted
        daemon_reload: yes

    # ─── CONFIGURE NGINX ─────────────────────────────────
    - name: Create Nginx config
      copy:
        dest: /etc/nginx/sites-available/budgetflow
        content: |
          server {
              listen 80;
              server_name _;

              location / {
                  proxy_pass http://127.0.0.1:5000;
                  proxy_set_header Host $host;
                  proxy_set_header X-Real-IP $remote_addr;
                  proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
              }
          }

    - name: Enable Nginx site
      file:
        src: /etc/nginx/sites-available/budgetflow
        dest: /etc/nginx/sites-enabled/budgetflow
        state: link

    - name: Remove default Nginx site
      file:
        path: /etc/nginx/sites-enabled/default
        state: absent

    - name: Restart Nginx
      systemd:
        name: nginx
        state: restarted
        enabled: yes

    # ─── INSTALL NODE EXPORTER (for Prometheus) ──────────
    - name: Download Node Exporter
      get_url:
        url: https://github.com/prometheus/node_exporter/releases/download/v1.7.0/node_exporter-1.7.0.linux-amd64.tar.gz
        dest: /tmp/node_exporter.tar.gz

    - name: Extract Node Exporter
      unarchive:
        src: /tmp/node_exporter.tar.gz
        dest: /tmp/
        remote_src: yes

    - name: Move Node Exporter binary
      copy:
        src: /tmp/node_exporter-1.7.0.linux-amd64/node_exporter
        dest: /usr/local/bin/node_exporter
        mode: '0755'
        remote_src: yes

    - name: Create Node Exporter service
      copy:
        dest: /etc/systemd/system/node_exporter.service
        content: |
          [Unit]
          Description=Prometheus Node Exporter
          After=network.target

          [Service]
          User=ubuntu
          ExecStart=/usr/local/bin/node_exporter
          Restart=always

          [Install]
          WantedBy=multi-user.target

    - name: Enable and start Node Exporter
      systemd:
        name: node_exporter
        enabled: yes
        state: restarted
        daemon_reload: yes
