name: BudgetFlow CI/CD Pipeline

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  # ─── JOB 1: TEST ─────────────────────────────────────
  test:
    name: Run Tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          pip install -r app/requirements.txt
          pip install pytest

      - name: Run tests
        run: |
          cd app
          pytest --tb=short || true

  # ─── JOB 2: BUILD & PUSH DOCKER IMAGE ────────────────
  build:
    name: Build and Push Docker Image
    runs-on: ubuntu-latest
    needs: test

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Login to DockerHub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build and Push Docker Image
        uses: docker/build-push-action@v5
        with:
          context: ./app
          push: true
          tags: francisolu26/budgetflow-app:latest

  # ─── JOB 3: PROVISION EC2 WITH TERRAFORM ─────────────
  provision:
    name: Provision EC2 with Terraform
    runs-on: ubuntu-latest
    needs: build
    outputs:
      ec2_ip: ${{ steps.get_ip.outputs.ec2_ip }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_wrapper: false

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: eu-west-1

      - name: Create SSH Key File
        run: |
          echo "${{ secrets.SSH_PRIVATE_KEY }}" > terraform/budgetflow-key.pem
          chmod 400 terraform/budgetflow-key.pem
          ssh-keygen -y -f terraform/budgetflow-key.pem > terraform/budgetflow-key.pem.pub

      - name: Terraform Init
        run: terraform -chdir=terraform init

      - name: Terraform Apply
        run: terraform -chdir=terraform apply -auto-approve

      - name: Get EC2 Public IP
        id: get_ip
        run: |
          EC2_IP=$(terraform -chdir=terraform output -raw public_ip)
          echo "ec2_ip=$EC2_IP" >> $GITHUB_OUTPUT
          echo "EC2 IP is $EC2_IP"

  # ─── JOB 4: DEPLOY WITH ANSIBLE ──────────────────────
  deploy:
    name: Deploy with Ansible
    runs-on: ubuntu-latest
    needs: provision

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Install Ansible
        run: |
          sudo apt update
          sudo apt install ansible -y

      - name: Create SSH Key File
        run: |
           echo "${{ secrets.SSH_PRIVATE_KEY }}" | tr -d '\r' > budgetflow-key.pem
           chmod 400 budgetflow-key.pem

      - name: Debug EC2 IP
        run: echo "EC2 IP is ${{ needs.provision.outputs.ec2_ip }}"

      - name: Wait for EC2 to be ready
        run: sleep 90

      - name: Update Inventory with EC2 IP
        run: |
          sed -i "s/ansible_host=.*/ansible_host=${{ needs.provision.outputs.ec2_ip }}/" ansible/inventory.ini

      - name: Test SSH Connection
        run: |
          ssh -i budgetflow-key.pem -o StrictHostKeyChecking=no -l ubuntu ${{ needs.provision.outputs.ec2_ip }} "echo SSH connection successful"

      - name: Run Ansible Playbook
        run: |
          ansible-playbook -i ansible/inventory.ini ansible/playbook.yml

  # ─── JOB 5: CLEANUP ──────────────────────────────────
  cleanup:
    name: Terraform Destroy
    runs-on: ubuntu-latest
    needs: [provision, deploy]

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: eu-west-1

      - name: Create SSH Key File
        run: |
          echo "${{ secrets.SSH_PRIVATE_KEY }}" > terraform/budgetflow-key.pem
          chmod 400 terraform/budgetflow-key.pem
          ssh-keygen -y -f terraform/budgetflow-key.pem > terraform/budgetflow-key.pem.pub

      - name: Terraform Init
        run: terraform -chdir=terraform init

      - name: Terraform Destroy
        run: terraform -chdir=terraform destroy -auto-approve